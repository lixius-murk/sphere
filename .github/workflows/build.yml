name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libpulse-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_QDS_COMPONENTS=OFF -DLINK_INSIGHT=OFF
          cmake --build build --config Release --parallel

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/eye_gymnasticsApp

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'

      - name: Configure
        shell: pwsh
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DBUILD_QDS_COMPONENTS=OFF -DLINK_INSIGHT=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Deploy
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "eye_gymnasticsApp.exe" build | Select-Object -First 1
          Write-Host "Found: $($exe.FullName)"
          New-Item -ItemType Directory -Force -Path dist-windows
          Copy-Item $exe.FullName dist-windows/
          $deploy = Get-ChildItem -Recurse -Filter "windeployqt6.exe" "D:\a\eye_gymnastics\Qt" | Select-Object -First 1
          Write-Host "windeployqt6: $($deploy.FullName)"
          & $deploy.FullName --qmldir . --release dist-windows/eye_gymnasticsApp.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist-windows/
