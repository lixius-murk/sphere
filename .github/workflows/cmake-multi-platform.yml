name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/eye_gymnasticsApp

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'
      - name: Build
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DLINK_INSIGHT=OFF -DBUILD_QDS_COMPONENTS=OFF
          cmake --build build --config Release --parallel
      - name: Deploy Qt deps
        run: |
          windeployqt6 build/Release/eye_gymnasticsApp.exe
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: windows-build
          path: build/Release/
